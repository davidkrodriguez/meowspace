services:
  postgres:
    image: postgres:16-alpine
    container_name: meowspace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meowspace
    ports:
      - "5432:5432"
    volumes:
      - meowspace_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meowspace"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  meowspace_pg_data:
